services:
  backend:
    restart: unless-stopped
    build: .
    container_name: eventora-backend
    ports:
      - "8000:1000"
    env_file:
      - .env
    depends_on:
      - redis
      

  worker:
    build: .
    container_name: eventora-worker
    command: npm run worker
    env_file:
      - .env
    depends_on:
      - redis

  redis:
    image: redis:7
    container_name: eventora-redis
    ports:
      - "6379:6379"